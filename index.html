<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VG Solutions – Premium Valorant Boosting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6D5EF7;
      --primary-dark: #5a4ad4;
      --secondary: #3FA9F5;
      --accent: #20D9B2;
      --success: #39D98A;
      --warning: #FFC857;
      --bg: #0A0D14;
      --card-bg: #111827;
      --border: rgba(255,255,255,0.07);
      --text-white: #ffffff;
      --text-gray: #d1d5db;
      --text-muted: #9ca3af;
      --radius: 24px;
      --shadow: 0 20px 60px rgba(0,0,0,0.6);
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-white);
      overflow-x: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
    .section-title {
      font-family: var(--font-heading);
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .section-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 48px;
    }
    .fade-up { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 16px 0;
      background: rgba(10, 13, 20, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    nav.scrolled { background: rgba(10, 13, 20, 0.95); }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo i { -webkit-text-fill-color: var(--primary); font-size: 1.6rem; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
    }
    .nav-links a {
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--text-gray);
      transition: color var(--transition);
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width var(--transition);
    }
    .nav-links a:hover { color: #fff; }
    .nav-links a:hover::after { width: 100%; }
    .nav-btn {
      background: var(--primary);
      color: #fff !important;
      padding: 8px 22px !important;
      border-radius: 40px !important;
      font-weight: 600 !important;
      transition: background var(--transition), transform var(--transition);
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn:hover { background: var(--primary-dark); transform: scale(1.04); }
    .nav-btn::after { display: none !important; }

    .hero {
      position: relative;
      z-index: 1;
      padding: 80px 0 60px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(ellipse at 30% 40%, rgba(109, 94, 247, 0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: heroGlow 12s ease-in-out infinite alternate;
    }
    @keyframes heroGlow {
      0% { transform: translate(0,0) scale(1); opacity: 0.6; }
      100% { transform: translate(40px, -30px) scale(1.1); opacity: 1; }
    }
    .hero-content { position: relative; z-index: 2; }
    .hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 1.3rem;
      color: var(--text-gray);
      max-width: 620px;
      margin: 0 auto 36px;
    }
    .hero-btns {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border: none;
      padding: 14px 40px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(109, 94, 247, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 16px 50px rgba(109, 94, 247, 0.45);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid var(--border);
      padding: 14px 40px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: background var(--transition), transform var(--transition), border-color var(--transition);
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.10);
      border-color: var(--primary);
      transform: translateY(-4px);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 28px;
      margin-top: 20px;
    }
    .service-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      cursor: default;
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(109,94,247,0.05), rgba(63,169,245,0.02));
      opacity: 0;
      transition: opacity var(--transition);
    }
    .service-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: var(--primary);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .service-card:hover::before { opacity: 1; }
    .service-card .icon {
      font-size: 2.8rem;
      color: var(--primary);
      margin-bottom: 14px;
      display: block;
      transition: transform var(--transition);
    }
    .service-card:hover .icon { transform: scale(1.1) rotate(-4deg); }
    .service-card h3 { font-family: var(--font-heading); font-size: 1.3rem; margin-bottom: 6px; }
    .service-card p { color: var(--text-muted); font-size: 0.95rem; }

    .calculator-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .tab-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-gray);
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-body);
    }
    .tab-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--primary);
      color: #fff;
      transform: translateY(-2px);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 30px rgba(109,94,247,0.3);
    }

    .calculator-section {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 40px 32px;
      margin: 20px 0;
      min-height: 420px;
    }
    .calc-panel { display: none; animation: fadeInPanel 0.4s ease; }
    .calc-panel.active { display: block; }
    @keyframes fadeInPanel {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .calc-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
      justify-content: center;
    }
    .calc-col {
      flex: 1 1 160px;
      min-width: 140px;
    }
    .calc-col h4 {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .rank-select {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 14px;
      width: 100%;
      color: #fff;
      font-size: 0.95rem;
      appearance: none;
      cursor: pointer;
      transition: border-color var(--transition);
      font-family: var(--font-body);
    }
    .rank-select:focus { outline: none; border-color: var(--primary); }
    .rank-select option { background: var(--bg); color: #fff; }
    .rank-select[type="number"] { appearance: textfield; }

    .calc-arrow {
      font-size: 2rem;
      color: var(--primary);
      text-align: center;
      animation: arrowPulse 2s infinite;
      padding-bottom: 8px;
    }
    @keyframes arrowPulse {
      0%, 100% { transform: translateX(0); opacity: 0.7; }
      50% { transform: translateX(8px); opacity: 1; }
    }

    .calc-options {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin: 24px 0 16px;
    }
    .switch-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid var(--border);
      transition: border-color var(--transition);
      cursor: pointer;
      position: relative;
    }
    .switch-item:hover { border-color: var(--primary); }
    .switch-item .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.75rem;
      white-space: nowrap;
      border: 1px solid var(--border);
    }
    .switch-item:hover .tooltip { display: block; }

    .switch {
      width: 40px;
      height: 22px;
      background: rgba(255,255,255,0.15);
      border-radius: 30px;
      position: relative;
      transition: background var(--transition);
      flex-shrink: 0;
    }
    .switch.active { background: var(--primary); }
    .switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform var(--transition);
    }
    .switch.active::after { transform: translateX(18px); }
    .switch-label { font-size: 0.85rem; color: var(--text-gray); }

    .calc-status {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 16px;
      margin-top: 20px;
      border: 1px solid var(--border);
    }
    .status-item { text-align: center; }
    .status-item .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-item .value {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
    }
    .calc-join { text-align: center; margin-top: 24px; }

    /* ─── PRICE DISPLAY ─── */
    .price-display {
      background: rgba(109,94,247,0.06);
      border: 1px solid rgba(109,94,247,0.15);
      border-radius: 16px;
      padding: 20px 24px;
      margin: 20px 0 12px;
      text-align: center;
    }
    .price-display .price-main {
      font-family: var(--font-heading);
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .price-display .price-main .currency {
      font-size: 1.6rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .price-display .price-detail {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .price-display .price-detail span { color: var(--text-gray); font-weight: 600; }
    .price-display .price-multiplier {
      font-size: 0.85rem;
      color: var(--warning);
      margin-top: 6px;
    }
    .price-display .price-eta {
      font-size: 0.9rem;
      color: var(--text-gray);
      margin-top: 4px;
    }
    .price-display .ticket-note {
      font-size: 0.95rem;
      color: var(--warning);
      font-weight: 600;
      margin-top: 6px;
    }
    .price-display .ticket-note i { color: var(--primary); margin-right: 6px; }

    .custom-input { display: none; margin-top: 8px; }
    .custom-input.visible { display: block; }

    /* ─── COACHING INSTRUCTOR CARDS ─── */
    .instructor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin: 16px 0 8px;
    }
    .instructor-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 12px;
      text-align: center;
      transition: all var(--transition);
      cursor: pointer;
    }
    .instructor-card:hover { border-color: var(--primary); background: rgba(109,94,247,0.06); }
    .instructor-card.active {
      border-color: var(--primary);
      background: rgba(109,94,247,0.10);
      box-shadow: 0 0 30px rgba(109,94,247,0.10);
    }
    .instructor-card .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #fff;
    }
    .instructor-card .name { font-weight: 600; font-size: 0.9rem; }
    .instructor-card .spec { font-size: 0.75rem; color: var(--text-muted); }

    .live-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px 24px;
      border: 1px solid var(--border);
      margin: 20px 0;
    }
    .live-item { text-align: center; }
    .live-item .number {
      font-family: var(--font-heading);
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    .live-item .label { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 24px;
    }
    .feature-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 28px 20px;
      border: 1px solid var(--border);
      text-align: center;
      transition: transform var(--transition), border-color var(--transition);
      cursor: default;
    }
    .feature-card:hover { transform: translateY(-6px); border-color: var(--primary); }
    .feature-card i { font-size: 2.2rem; color: var(--primary); margin-bottom: 12px; }
    .feature-card h4 { font-family: var(--font-heading); font-size: 1.1rem; margin-bottom: 4px; }
    .feature-card p { color: var(--text-muted); font-size: 0.9rem; }

    .how-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 32px;
      counter-reset: step;
    }
    .how-step {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px 24px;
      border: 1px solid var(--border);
      text-align: center;
      position: relative;
      transition: transform var(--transition);
      counter-increment: step;
    }
    .how-step::before {
      content: counter(step);
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      box-shadow: 0 8px 20px rgba(109,94,247,0.3);
    }
    .how-step:hover { transform: translateY(-8px); }
    .how-step h4 { font-family: var(--font-heading); font-size: 1.3rem; margin-top: 12px; }
    .how-step p { color: var(--text-muted); font-size: 0.95rem; }

    .faq-list { display: flex; flex-direction: column; gap: 12px; max-width: 800px; margin: 0 auto; }
    .faq-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color var(--transition);
    }
    .faq-item:hover { border-color: var(--primary); }
    .faq-question {
      padding: 18px 24px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background var(--transition);
    }
    .faq-question:hover { background: rgba(255,255,255,0.03); }
    .faq-question i { transition: transform var(--transition); color: var(--primary); }
    .faq-item.open .faq-question i { transform: rotate(180deg); }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      padding: 0 24px;
      color: var(--text-gray);
      transition: max-height 0.4s ease, padding 0.4s ease;
    }
    .faq-item.open .faq-answer { max-height: 300px; padding: 0 24px 20px; }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }
    .review-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--border);
      transition: transform var(--transition);
    }
    .review-card:hover { transform: translateY(-6px); }
    .review-card .stars { color: var(--warning); letter-spacing: 2px; }
    .review-card .text { color: var(--text-gray); font-size: 0.95rem; margin: 10px 0; }
    .review-card .author { display: flex; align-items: center; gap: 12px; }
    .review-card .author .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
    }

    .chat-toggle {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 2000;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border: none;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      font-size: 1.8rem;
      box-shadow: 0 8px 30px rgba(109,94,247,0.4);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-toggle:hover { transform: scale(1.08); box-shadow: 0 12px 40px rgba(109,94,247,0.6); }
    .chat-window {
      position: fixed;
      bottom: 100px;
      right: 28px;
      width: 380px;
      max-width: calc(100vw - 56px);
      max-height: 520px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: none;
      flex-direction: column;
      z-index: 2001;
      overflow: hidden;
      animation: slideUp 0.3s ease;
    }
    .chat-window.open { display: flex; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h4 { font-family: var(--font-heading); font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
    .chat-header h4 i { color: var(--primary); }
    .chat-header .close-chat { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
    .chat-messages {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 200px;
      max-height: 320px;
    }
    .chat-msg {
      max-width: 80%;
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      animation: msgIn 0.3s ease;
    }
    .chat-msg.bot { background: rgba(255,255,255,0.06); align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-msg.user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chat-typing {
      display: none;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 4px 0;
    }
    .chat-typing span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite;
    }
    .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }
    .chat-quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 16px 0;
    }
    .chat-quick-btns button {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 16px;
      color: var(--text-gray);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
    }
    .chat-quick-btns button:hover { background: rgba(255,255,255,0.10); border-color: var(--primary); color: #fff; }
    .chat-input-area {
      display: flex;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      gap: 10px;
    }
    .chat-input-area input { flex: 1; background: transparent; border: none; color: #fff; font-size: 0.95rem; outline: none; }
    .chat-input-area input::placeholder { color: var(--text-muted); }
    .chat-input-area button { background: var(--primary); border: none; color: #fff; padding: 6px 16px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: background var(--transition); }
    .chat-input-area button:hover { background: var(--primary-dark); }
    .chat-settings {
      display: none;
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }
    .chat-settings.open { display: flex; }
    .chat-settings label { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-gray); cursor: pointer; }
    .chat-settings label input[type="checkbox"] { accent-color: var(--primary); }

    footer {
      border-top: 1px solid var(--border);
      padding: 40px 0 24px;
      margin-top: 40px;
      text-align: center;
      color: var(--text-muted);
    }
    footer .footer-links { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin: 16px 0; }
    footer .footer-links a { color: var(--text-gray); transition: color var(--transition); }
    footer .footer-links a:hover { color: #fff; }

    @media (max-width: 768px) {
      .nav-inner { flex-direction: column; align-items: stretch; }
      .nav-links { justify-content: center; gap: 16px; }
      .hero h1 { font-size: 2.8rem; }
      .calc-grid { flex-direction: column; align-items: stretch; }
      .calc-arrow { transform: rotate(90deg); padding: 12px 0; }
      .chat-window { width: calc(100vw - 32px); right: 16px; bottom: 90px; max-height: 460px; }
      .calculator-tabs { gap: 8px; }
      .tab-btn { padding: 10px 20px; font-size: 0.85rem; }
      .instructor-grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
    }
    @media (max-width: 480px) {
      .hero h1 { font-size: 2.2rem; }
      .btn-primary, .btn-secondary { padding: 12px 28px; font-size: 1rem; }
      .live-panel { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
